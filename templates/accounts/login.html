{% extends 'base.html' %}

{% block title %}Вход — Puzzle House{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Добро пожаловать</h1>
    <p class="auth-card__subtitle">Войдите в свой аккаунт</p>

    <form method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-group">
        <label for="id_username">Имя пользователя</label>
        <input type="text" name="username" id="id_username"
               placeholder="username" class="no-icon" autocomplete="username">
      </div>

      <div class="form-group">
        <label for="id_password">Пароль</label>
        <input type="password" name="password" id="id_password"
               placeholder="Ваш пароль" class="no-icon" autocomplete="current-password">
      </div>

      {% if error %}
        <p class="form-field-error">{{ error }}</p>
      {% endif %}

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
        Войти
      </button>
    </form>

    <p class="auth-link">
      Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a>
    </p>
  </div>
</div>
{% endblock %}
